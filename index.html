<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Loan Eligibility Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🏦 Bank Loan Eligibility Prediction System</h1>

    <form action="/predict" method="POST">

        <div class="form-group">
            <label>Customer Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" required>
        </div>

        <div class="form-group">
            <label>Monthly Salary</label>
            <input type="number" name="salary" required>
        </div>

        <div class="form-group">
            <label>CIBIL Score</label>
            <input type="number" name="cibil" required>
        </div>

        <div class="form-group">
            <label>Experience (Years)</label>
            <input type="number" name="experience" required>
        </div>

        <div class="form-group">
            <label>Employment Type</label>
            <select name="employment_type">
                <option>Government</option>
                <option>Private</option>
                <option>Business</option>
                <option>Self-Employed</option>
            </select>
        </div>

        <div class="form-group">
            <label>Existing EMI</label>
            <input type="number" name="existing_emi" required>
        </div>

        <div class="form-group">
            <label>Loan Amount Requested</label>
            <input type="number" name="loan_amount_requested" required>
        </div>

        <div class="form-group">
            <label>Bank Balance</label>
            <input type="number" name="bank_balance" required>
        </div>

        <div class="form-group">
            <label>Dependents</label>
            <input type="number" name="dependents" required>
        </div>

        <div class="full-width">
            <button type="submit">Check Loan Eligibility</button>
        </div>

    </form>

    <div class="buttons">

        <a href="/manager">
            <button>Manager Dashboard</button>
        </a>

        <a href="/customers">
            <button>View Customers</button>
        </a>

    </div>

</div>

</body>
</html>
